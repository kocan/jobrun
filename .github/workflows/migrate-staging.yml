name: Supabase Migrate Staging

on:
  push:
    branches:
      - main
    paths:
      - 'supabase/migrations/**'
      - '.github/workflows/migrate-staging.yml'
  workflow_dispatch:

jobs:
  migrate-staging:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
      PROJECT_REF: ${{ secrets.STAGING_SUPABASE_PROJECT_REF }}
    steps:
      - uses: actions/checkout@v6
      - uses: supabase/setup-cli@v1
      - name: Link project
        run: supabase link --project-ref "$PROJECT_REF"
      - name: Push migrations
        run: supabase db push --password "$SUPABASE_DB_PASSWORD"
